version: '3.8'

services:
  # -------------------------------------
  # 1. Database (Postgres for MLflow & Feast)
  # -------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-startup_intelligence}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------
  # 2. Object Storage (MinIO for MLflow artifacts)
  # -------------------------------------
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # -------------------------------------
  # 3. MLflow Tracking Server
  # -------------------------------------
  mlflow:
    image: python:3.10-slim
    command: >
      bash -c "pip install mlflow psycopg2-binary boto3 &&
               mlflow server
                 --backend-store-uri postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-startup_intelligence}
                 --default-artifact-root s3://mlflow/
                 --host 0.0.0.0"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # -------------------------------------
  # 4. Redis (Cache for FAISS + Feast online store)
  # -------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------
  # 5. Feature Store (Feast)
  # -------------------------------------
  feast:
    image: python:3.10-slim
    command: bash -c "pip install feast[redis,postgres] && feast serve -h 0.0.0.0"
    working_dir: /feature_store
    volumes:
      - ../feature_store:/feature_store
    ports:
      - "6566:6566"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -------------------------------------
  # 6. Prometheus (Metrics)
  # -------------------------------------
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # -------------------------------------
  # 7. Grafana (Dashboards)
  # -------------------------------------
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
    depends_on:
      - prometheus

  # -------------------------------------
  # 8. FastAPI Backend
  # -------------------------------------
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-Startup-Success-Predictor}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ../app/backend:/app
      - ../src:/src
    depends_on:
      redis:
        condition: service_healthy
      feast:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  minio_data:
